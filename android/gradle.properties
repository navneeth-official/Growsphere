org.gradle.jvmargs=-Xmx4G
android.useAndroidX=true
android.enableJetifier=true

# Android Gradle Plugin 8.x requires JDK 17+ to run Gradle (not Java 11 from Studio's "jre").
#
# Pick ONE approach (do not set org.gradle.java.home to a path that does not exist — Gradle will fail):
#
# A) Recommended — applies to all Flutter commands:
#    flutter config --jdk-dir="C:\Program Files\Java\jdk-21"
#    (Use your real JDK folder: it must contain bin\java.exe. No \bin on the end.)
#
# B) Per-shell before building:
#    set JAVA_HOME=C:\Program Files\Java\jdk-21
#
# C) Uncomment ONLY after you verify the folder exists in File Explorer:
# org.gradle.java.home=C:\\Program Files\\Java\\jdk-21.0.11
#
# Android Studio "jbr" (JDK 17) only works if that folder exists on your machine — many installs use a different path.
