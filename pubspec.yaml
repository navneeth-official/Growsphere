name: growspehere_v1
description: Growsphere — nature-themed plant care companion (offline-first).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  geolocator: ^13.0.2
  http: ^1.2.2
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  google_generative_ai: ^0.4.7
  url_launcher: ^6.3.1
  # flutter_timezone 4.x requires Dart >=3.4.0; 3.x works with this app's SDK floor (3.2.2+).
  flutter_timezone: '>=3.0.1 <4.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/data/plants.json
    - assets/images/crops/
    - assets/images/categories/
