name: growspehere_v1
description: Growsphere — nature-themed plant care companion (offline-first).
publish_to: 'none'
version: 1.0.0+1

environment:
  # speech_to_text 7.3.x requires Dart >=3.3.0; keeps pub from resolving 6.x on older SDK floors.
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  geolocator: ^13.0.2
  http: ^1.2.2
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  google_generative_ai: ^0.4.7
  url_launcher: ^6.3.1
  # flutter_timezone 4.x requires Dart >=3.4.0; 3.x works with this SDK range.
  flutter_timezone: '>=3.0.1 <4.0.0'
  # 6.6.x: Android v1 embedding (Registrar). Pin 7.3.0 so a stale lockfile cannot pull 6.x.
  speech_to_text: 7.3.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: false
  ios: true
  macos: true
  image_path: assets/branding/app_icon_source.png
  web:
    generate: true
    image_path: assets/branding/app_icon_source.png
    background_color: '#0d2615'
    theme_color: '#0d2615'

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/data/plants.json
    # Only files directly under crops/ are bundled; hands/ must be listed separately (Flutter 3+).
    - assets/images/crops/
    - assets/images/crops/hands/
    - assets/images/categories/
